<!DOCTYPE html>
<html>
<head>
    <title>Employee Table</title>
</head>
<body>

    <h2>BCA 4<sup>th</sup> SEM</h2>
    

    <table border="1">
        <tr>
            <th colspan="4">Emp Details</th>
        </tr>

        <tr>
            <th>EmpID</th>
            <th>Name</th>
            <th>Salary</th>
            <th>Age</th>
        </tr>

        <tr>
            <td>1</td>
            <td>ABC</td>
            <td>50000</td>
            <td>30</td>
        </tr>

        <tr>
            <td>2</td>
            <td>XYZ</td>
            <td>60000</td>
            <td>25</td>
        </tr>

        <tr>
            <td rowspan="2">Total</td>
            <td>Count</td>
            <td>2</td>
            <td>2</td>
        </tr>

        <tr>
            <td>Sum</td>
            <td>110000</td>
            <td>55</td>
        </tr>
    </table>

</body>
</html>
